<?xml version="1.0" standalone="no"?>
<svg id="chatvexa-svg" viewBox="0 0 160 160" width="300" height="300" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Vibrant App Icon Gradient -->
                <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22c55e"/>   <!-- Bright Green -->
                    <stop offset="50%" stop-color="#10b981"/>  <!-- WA Green -->
                    <stop offset="100%" stop-color="#047857"/> <!-- Emerald Deep -->
                </linearGradient>
                
                <!-- Glass Rim Highlight (Apple iOS Style 3D Edge) -->
                <linearGradient id="rimGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
                </linearGradient>

                <!-- Text Gradient for "vexa" -->
                <linearGradient id="vexaText" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#10b981"/>
                    <stop offset="100%" stop-color="#059669"/>
                </linearGradient>

                <!-- Soft Drop Shadow -->
                <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#047857" flood-opacity="0.3"/>
                </filter>
                
                <!-- Inner Sparkle Glow -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.9"/>
                </filter>

                <!-- Bot Head Inner Shadow -->
                <filter id="innerShadow">
                    <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
                </filter>
            </defs>

            <!-- Graphic Icon Group -->
            <g transform="translate(25, 25)" filter="url(#iconShadow)">
                <!-- 1. Main WhatsApp Bubble Base -->
                <path d="M 55 5 C 88 5 110 27 110 55 C 110 83 88 105 55 105 C 42 105 31 100 22 93 L 5 105 L 12 87 C 4 78 0 67 0 55 C 0 27 22 5 55 5 Z" fill="url(#bubbleGrad)"/>
                
                <!-- 3D Glass Rim / Bevel -->
                <path d="M 55 5 C 88 5 110 27 110 55 C 110 83 88 105 55 105 C 42 105 31 100 22 93 L 5 105 L 12 87 C 4 78 0 67 0 55 C 0 27 22 5 55 5 Z" fill="none" stroke="url(#rimGlow)" stroke-width="2.5"/>

                <!-- 2. The Automation Gear (Background inside bubble) -->
                <g stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.25">
                    <line x1="55" y1="12" x2="55" y2="24"/>
                    <line x1="55" y1="86" x2="55" y2="98"/>
                    <line x1="12" y1="55" x2="24" y2="55"/>
                    <line x1="86" y1="55" x2="98" y2="55"/>
                    <line x1="25" y1="25" x2="33" y2="33"/>
                    <line x1="85" y1="85" x2="77" y2="77"/>
                    <line x1="25" y1="85" x2="33" y2="77"/>
                    <line x1="85" y1="25" x2="77" y2="33"/>
                    <circle cx="55" cy="55" r="35" stroke-width="3.5" stroke-dasharray="8 6"/>
                </g>
                
                <!-- 3. The Robot Bot Head -->
                <g transform="translate(0, 0)">
                    <!-- Antenna -->
                    <path d="M 55 35 L 55 16" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
                    <circle cx="55" cy="12" r="4.5" fill="#DCF8C6" filter="url(#glow)"/>
                    
                    <!-- Bot Face Plate -->
                    <rect x="25" y="32" width="60" height="46" rx="14" fill="#047857" stroke="#ffffff" stroke-width="4" filter="url(#innerShadow)"/>
                    
                    <!-- Glowing Bot Eyes -->
                    <circle cx="38" cy="50" r="5" fill="#DCF8C6" filter="url(#glow)"/>
                    <circle cx="72" cy="50" r="5" fill="#DCF8C6" filter="url(#glow)"/>
                    
                    <!-- Vexa Mouth ('V' Shape) -->
                    <path d="M 47 62 L 55 70 L 63 62" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
            </g>
        </svg>